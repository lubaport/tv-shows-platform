<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Shows Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        .episodes-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .episode-card {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            transition: transform 0.2s;
        }

        .episode-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .show-name {
            font-size: 1.2em;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .episode-info {
            color: #666;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .episode-info strong {
            color: #333;
        }

        .release-date {
            color: #667eea;
            font-weight: 600;
            margin-top: 12px;
            font-size: 0.9em;
        }

        .remove-btn {
            width: auto;
            padding: 6px 12px;
            background: #dc3545;
            font-size: 0.8em;
            margin-top: 12px;
        }

        .remove-btn:hover {
            background: #c82333;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            grid-column: 1 / -1;
        }

        .followed-shows {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .followed-shows h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .show-list {
            list-style: none;
        }

        .show-list li {
            padding: 10px;
            background: white;
            margin-bottom: 8px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .show-list strong {
            color: #667eea;
        }

        .unfollow-btn {
            padding: 4px 8px;
            font-size: 0.75em;
            background: #dc3545;
        }

        .loading {
            display: inline-block;
            color: #667eea;
            font-weight: 600;
        }

        .error {
            color: #dc3545;
            padding: 12px;
            background: #f8d7da;
            border-radius: 4px;
            margin-top: 10px;
        }

        .success {
            color: #155724;
            padding: 12px;
            background: #d4edda;
            border-radius: 4px;
            margin-top: 10px;
        }

        .autocomplete-container {
            position: relative;
        }

        .autocomplete-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e0e0e0;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 10;
            display: none;
        }

        .autocomplete-suggestions.active {
            display: block;
        }

        .autocomplete-suggestion {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .autocomplete-suggestion:hover {
            background: #f8f9fa;
        }

        .autocomplete-suggestion:last-child {
            border-bottom: none;
        }

        .suggestion-title {
            color: #333;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .suggestion-year {
            color: #999;
            font-size: 0.85em;
        }

        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 1.8em;
            }

            .episodes-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📺 TV Shows Manager</h1>
            <p>Keep track of your favorite shows and upcoming episodes</p>
        </header>

        <div class="content">
            <!-- Add Show Form -->
            <div class="card">
                <h2>Add a Show</h2>
                <form id="addShowForm">
                    <div class="form-group">
                        <label for="showName">Show Name</label>
                        <div class="autocomplete-container">
                            <input type="text" id="showName" placeholder="e.g., Breaking Bad, The Office" required>
                            <div class="autocomplete-suggestions" id="suggestions"></div>
                        </div>
                    </div>
                    <button type="submit">Search & Add</button>
                    <div id="addMessage"></div>
                </form>

                <!-- Followed Shows List -->
                <div class="followed-shows">
                    <h3>Following (${followedShows.length})</h3>
                    <ul class="show-list" id="followedList">
                        <li style="color: #999;">No shows yet</li>
                    </ul>
                </div>
            </div>

            <!-- Upcoming Episodes -->
            <div class="card">
                <h2>Upcoming Episodes</h2>
                <div class="episodes-container" id="episodesList">
                    <div class="empty-state">
                        <p>No upcoming episodes. Add a show to get started!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TVMAZE_API = 'https://api.tvmaze.com';
        let followedShows = [];
        let nextId = 1;

        // Format date
        function formatDate(dateString) {
            if (!dateString) return 'TBA';
            return new Date(dateString).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        // Fetch show by name from TVMaze
        async function searchShow(showName) {
            try {
                const url = `${TVMAZE_API}/singlesearch/shows?q=${encodeURIComponent(showName)}`;
                console.log('Searching for show:', url);
                const response = await fetch(url);
                if (!response.ok) throw new Error('Show not found');
                const data = await response.json();
                console.log('Show data:', data);
                return data;
            } catch (error) {
                throw new Error(`Could not find show "${showName}". Please check the spelling and try again.`);
            }
        }

        // Fetch next episode for a show
        async function getNextEpisode(showId) {
            try {
                const response = await fetch(`${TVMAZE_API}/shows/${showId}/nextepisode`);
                console.log(`Fetching nextepisode for showId ${showId}: status ${response.status}`);
                if (!response.ok) throw new Error('No upcoming episodes');
                const data = await response.json();
                console.log('Next episode data:', data);
                return data;
            } catch (error) {
                console.log('Error fetching next episode, checking all episodes:', error.message);
                // Fallback: get all episodes and look for upcoming ones first, then last aired
                try {
                    const episodesResponse = await fetch(`${TVMAZE_API}/shows/${showId}/episodes`);
                    if (!episodesResponse.ok) throw new Error('Could not fetch episodes');
                    const episodes = await episodesResponse.json();
                    console.log('All episodes count:', episodes.length);

                    const today = new Date();
                    today.setHours(0, 0, 0, 0);

                    // Filter for upcoming episodes (airdate is in the future)
                    const upcomingEpisodes = episodes.filter(ep => {
                        if (!ep.airdate) return false;
                        return new Date(ep.airdate) > today;
                    });

                    if (upcomingEpisodes.length > 0) {
                        console.log('Found upcoming episode:', upcomingEpisodes[0]);
                        return upcomingEpisodes[0];
                    }

                    // If no upcoming episodes, return the last aired episode
                    const airedEpisodes = episodes.filter(ep => {
                        if (!ep.airdate) return false;
                        return new Date(ep.airdate) <= today;
                    });

                    if (airedEpisodes.length === 0) return null;

                    console.log('No upcoming episodes, returning last aired:', airedEpisodes[airedEpisodes.length - 1]);
                    return airedEpisodes[airedEpisodes.length - 1];
                } catch {
                    console.log('Error fetching all episodes');
                    return null;
                }
            }
        }

        // Render episodes sorted by date
        function renderEpisodes() {
            const episodesList = document.getElementById('episodesList');

            if (followedShows.length === 0) {
                episodesList.innerHTML = '<div class="empty-state"><p>No upcoming episodes. Add a show to get started!</p></div>';
                return;
            }

            const sorted = [...followedShows].sort((a, b) => {
                const dateA = a.airDate ? new Date(a.airDate) : new Date(0);
                const dateB = b.airDate ? new Date(b.airDate) : new Date(0);
                return dateA - dateB;
            });

            episodesList.innerHTML = sorted.map(show => `
                <div class="episode-card">
                    <div class="show-name">${show.showName}</div>
                    <div class="episode-info">${show.episodeName}</div>
                    <div class="episode-info">Season <strong>${show.season}</strong> Episode <strong>${show.number}</strong></div>
                    <div class="release-date">📅 ${formatDate(show.airDate)}</div>
                    <button class="remove-btn" onclick="removeShow(${show.id})">Remove Show</button>
                </div>
            `).join('');
        }

        // Render followed shows list
        function renderFollowedList() {
            const followedList = document.getElementById('followedList');
            if (followedShows.length === 0) {
                followedList.innerHTML = '<li style="color: #999;">No shows yet</li>';
                return;
            }
            followedList.innerHTML = followedShows.map(show => `
                <li>
                    <strong>${show.showName}</strong>
                    <button class="unfollow-btn" onclick="removeShow(${show.id})">Unfollow</button>
                </li>
            `).join('');
        }

        // Autocomplete
        let autocompleteTimeout;
        const showNameInput = document.getElementById('showName');
        const suggestionsDiv = document.getElementById('suggestions');

        showNameInput.addEventListener('input', async (e) => {
            const query = e.target.value.trim();

            // Clear previous timeout
            clearTimeout(autocompleteTimeout);

            if (query.length < 2) {
                suggestionsDiv.classList.remove('active');
                return;
            }

            // Debounce API call
            autocompleteTimeout = setTimeout(async () => {
                try {
                    const response = await fetch(`${TVMAZE_API}/search/shows?q=${encodeURIComponent(query)}`);
                    if (!response.ok) throw new Error('Search failed');
                    const results = await response.json();

                    if (results.length === 0) {
                        suggestionsDiv.innerHTML = '<div class="autocomplete-suggestion" style="color: #999;">No shows found</div>';
                        suggestionsDiv.classList.add('active');
                        return;
                    }

                    // Show top 10 results
                    suggestionsDiv.innerHTML = results.slice(0, 10).map(result => {
                        const show = result.show;
                        const year = show.premiered ? new Date(show.premiered).getFullYear() : 'N/A';
                        return `
                            <div class="autocomplete-suggestion" data-show-id="${show.id}" data-show-name="${show.name}">
                                <div class="suggestion-title">${show.name}</div>
                                <div class="suggestion-year">${year}</div>
                            </div>
                        `;
                    }).join('');

                    suggestionsDiv.classList.add('active');

                    // Add click handlers to suggestions
                    document.querySelectorAll('.autocomplete-suggestion').forEach(suggestion => {
                        suggestion.addEventListener('click', () => {
                            const showName = suggestion.getAttribute('data-show-name');
                            showNameInput.value = showName;
                            suggestionsDiv.classList.remove('active');
                        });
                    });

                } catch (error) {
                    console.log('Autocomplete error:', error);
                    suggestionsDiv.classList.remove('active');
                }
            }, 300); // Wait 300ms before searching
        });

        // Hide suggestions when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.autocomplete-container')) {
                suggestionsDiv.classList.remove('active');
            }
        });

        // Add show
        document.getElementById('addShowForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const showNameInput = document.getElementById('showName');
            const messageDiv = document.getElementById('addMessage');
            const showName = showNameInput.value.trim();

            messageDiv.innerHTML = '<div class="loading">Searching...</div>';
            messageDiv.style.marginTop = '10px';

            try {
                // Search for the show
                const showData = await searchShow(showName);

                // Get next episode
                const episode = await getNextEpisode(showData.id);

                if (!episode) {
                    throw new Error(`No upcoming episodes scheduled for "${showData.name}"`);
                }

                // Add to followed shows
                followedShows.push({
                    id: nextId++,
                    showName: showData.name,
                    season: episode.season,
                    number: episode.number,
                    episodeName: episode.name,
                    airDate: episode.airdate,
                    tvmazeId: showData.id
                });

                messageDiv.innerHTML = `<div class="success">✓ Added "${showData.name}"</div>`;
                showNameInput.value = '';

                renderEpisodes();
                renderFollowedList();

                // Clear message after 3 seconds
                setTimeout(() => {
                    messageDiv.innerHTML = '';
                }, 3000);

            } catch (error) {
                messageDiv.innerHTML = `<div class="error">✗ ${error.message}</div>`;
            }
        });

        // Remove show
        function removeShow(id) {
            followedShows = followedShows.filter(show => show.id !== id);
            renderEpisodes();
            renderFollowedList();
        }

        // Initial render
        renderEpisodes();
        renderFollowedList();
    </script>
</body>
</html>
